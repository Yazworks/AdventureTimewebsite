<!DOCTYPE html>
<html>
<head>
  <title>The Land of Ooo</title>

  <link rel="stylesheet" href="style.css">

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark ooo-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">The Land of Ooo</a>

      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#oooNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="oooNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="treehouse.html">Treehouse</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="candykingdom.html">Candy Kingdom</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="mountcragdor.html">Mount Cragdor</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="home-hero">

    <div class="scroll-stage">
      <img class="open-scroll" src="assets/images/LandofOOOscroll.png" alt="Land of Ooo Scroll">

      <img class="closed-scroll left-scroll" src="assets/images/scroll-closed.png" alt="Closed scroll">
      <img class="closed-scroll right-scroll" src="assets/images/scroll-closed.png" alt="Closed scroll">
    </div>

  </header>

<main class="location-stage">

  <a href="treehouse.html" class="location-card treehouse-card">
    <img src="assets/images/TreehousePic.png" alt="Treehouse" class="location-img">

    <div class="hover-scroll">
      <img class="hover-open-scroll" src="assets/images/TreehouseScroll.png" alt="Treehouse Scroll">
      <img class="hover-roll left-roll" src="assets/images/scroll-closed.png" alt="">
      <img class="hover-roll right-roll" src="assets/images/scroll-closed.png" alt="">
    </div>
  </a>

  <a href="candykingdom.html" class="location-card candy-card">
    <img src="assets/images/CandKingdompic.png" alt="Candy Kingdom" class="location-img">

    <div class="hover-scroll">
      <img class="hover-open-scroll" src="assets/images/CandyKingdomScroll.png" alt="Candy Kingdom Scroll">
      <img class="hover-roll left-roll" src="assets/images/scroll-closed.png" alt="">
      <img class="hover-roll right-roll" src="assets/images/scroll-closed.png" alt="">
    </div>
  </a>

  <a href="mountcragdor.html" class="location-card cragdor-card">
    <img src="assets/images/MountCragdor.png" alt="Mount Cragdor" class="location-img">

    <div class="hover-scroll">
      <img class="hover-open-scroll" src="assets/images/MountCragdorScroll.png" alt="Mount Cragdor Scroll">
      <img class="hover-roll left-roll" src="assets/images/scroll-closed.png" alt="">
      <img class="hover-roll right-roll" src="assets/images/scroll-closed.png" alt="">
    </div>
  </a>

</main>

  <script>
    const pageConfig = {
      type: "home",
      background: "assets/images/LandofOOO.jpg"
    };
  </script>

  <script src="script.js"></script>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
